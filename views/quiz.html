

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- CONFIGURAÇÕES -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Quiz Acadêmico</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="/css/quiz.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- TELA INICIAL -->
    <!-- ========================= -->

    <div
        class="container"
        id="startScreen"
    >

        <h1>Quiz Acadêmico</h1>

        <p>
            Teste seus conhecimentos
            e veja sua posição
            no ranking.
        </p>

        <button
            class="btn"
            onclick="startQuiz()"
        >

            Iniciar Quiz

        </button>

    </div>

    <!-- ========================= -->
    <!-- QUIZ -->
    <!-- ========================= -->

    <div
        class="container"
        id="quizScreen"
        style="display: none;"
    >

        <div class="question-box">

            <!-- NÚMERO -->
            <span
                class="question-number"
                id="questionNumber"
            >

                Pergunta 1

            </span>

            <!-- PERGUNTA -->
            <h2 id="questionText">

                Carregando pergunta...

            </h2>

            <!-- ALTERNATIVAS -->
            <div id="optionsContainer">

            </div>

        </div>

        <!-- BOTÃO -->
        <button
            class="btn"
            onclick="proximaPergunta()"
        >

            Próxima Pergunta

        </button>

    </div>

    <!-- ========================= -->
    <!-- RESULTADO -->
    <!-- ========================= -->

    <div
        class="container"
        id="resultScreen"
        style="display: none;"
    >

        <div class="result-box">

            <h1>
                Quiz Finalizado
            </h1>

            <!-- PONTUAÇÃO -->
            <div
                class="score"
                id="pontuacaoFinal"
            >

                0 Pontos

            </div>

            <!-- MENSAGEM -->
            <p id="messageResult">

                Resultado do quiz.

            </p>

            <!-- BOTÕES -->

            <button
                class="btn"
                onclick="showRanking()"
            >

                Ver Ranking

            </button>

            <button
                class="btn"
                onclick="restartQuiz()"
            >

                Jogar Novamente

            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- RANKING -->
    <!-- ========================= -->

    <div
        class="container"
        id="rankingScreen"
        style="display: none;"
    >

        <h1>Ranking</h1>

        <table>

            <thead>

                <tr>

                    <th>#</th>

                    <th>Jogador</th>

                    <th>Pontos</th>

                </tr>

            </thead>

            <tbody id="rankingTabela">

            </tbody>

        </table>

        <button
            class="btn"
            onclick="restartQuiz()"
        >

            Voltar ao Início

        </button>

    </div>

    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->

    <script src="/js/quiz.js"></script>

    <script src="/js/ranking.js"></script>

</body>

</html>
