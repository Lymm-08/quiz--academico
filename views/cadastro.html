
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Quiz - Cadastro</title>

  <link rel="stylesheet" href="/css/cadastro.css">
</head>

<body>

  <div class="card">

    <h2>SIGN UP</h2>

    <form>

      <!-- NOME -->
      <div class="input-box">
        <input
          id="nome"
          type="text"
          placeholder="Nome completo">
      </div>

      <!-- EMAIL -->
      <div class="input-box">
        <input
          id="email"
          type="email"
          placeholder="Email">
      </div>

      <!-- SENHA -->
      <div class="input-box">
        <input
          id="senha"
          type="password"
          placeholder="Senha">
      </div>

      <!-- CONFIRMAR SENHA -->
      <div class="input-box">
        <input
          id="confirmarSenha"
          type="password"
          placeholder="Confirmar senha">
      </div>

      <!-- BOTÃO CADASTRO -->
      <button
        type="button"
        id="cadastroBtn"
        class="btn"
        onclick="cadastrar()">

        Cadastrar

      </button>

      <p class="divider">
        ou continue com
      </p>

      <!-- VOLTAR LOGIN -->
      <div class="social">

        <button
          type="button"
          class="btn"
          id="botaoVoltarLogin">

          ← Voltar ao login

        </button>

      </div>

    </form>

  </div>

  <script>

    // BOTÃO LOGIN
    const botao =
      document.getElementById("botaoVoltarLogin");

    botao.addEventListener("click", () => {

      window.location.href =
        "login.html";

    });


    // FUNÇÃO CADASTRO
    async function cadastrar() {

      const nome =
        document.getElementById('nome').value;

      const email =
        document.getElementById('email').value;

      const senha =
        document.getElementById('senha').value;

      const confirmar =
        document.getElementById('confirmarSenha').value;


      // CAMPOS VAZIOS
      if (!nome || !email || !senha || !confirmar) {

        alert("Preencha todos os campos!");

        return;
      }

      // //senha forte
      // let pontos = 0;

      // if (/[a-z]/.test(senha)) {
      //   pontos++;
      // }

      // if (/[A-Z]/.test(senha)) {
      //   pontos++;
      // }

      // if(/[0-9]/.test(senha)){
      //   pontos++;
      // }

      // if(/[^A-Za-z0-9]/.test(senha)){
      //   pontos++
      // }

      // if(pontos<=3){
      //   alert("Sua senha é muito fraca! Utilize letras maiúsculas e minúsculas, números e caracteres especiais.");

      //   return;
      // }


      // SENHAS DIFERENTES
      if (senha !== confirmar) {

        alert("As senhas não coincidem!");

        return;
      }


      try {

        const resposta = await fetch("http://localhost:3000/api/users/cadastro", {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            nome,
            email,
            senha
          })

        });

        const dados = await resposta.json();
console.log(dados)

        // CADASTRO CORRETO
        if (dados.mensagem) {

          alert("Usuário cadastrado com sucesso!");

          window.location.href =
            '/';

        }

        // CADASTRO ERRADO
        else {

          alert("Usuário não cadastrado!");

        }

      }

      // ERRO SERVIDOR
      catch (erro) {

        console.error(erro);

        alert("Erro ao conectar com o servidor!");

      }

    }

  </script>

</body>

</html>
